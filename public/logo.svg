<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0DDA8"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A6791F"/>
    </linearGradient>
  </defs>

  <!-- Medallion background -->
  <circle cx="100" cy="100" r="96" fill="#0B1422"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.55"/>

  <!-- Apex finial dot -->
  <circle cx="100" cy="40" r="3.2" fill="url(#goldGrad)"/>

  <!-- Monogram V — two tapered bars meeting at a point (chalice silhouette) -->
  <polygon points="62,50 76,50 103,140 96,140" fill="url(#goldGrad)"/>
  <polygon points="138,50 124,50 97,140 104,140" fill="url(#goldGrad)"/>

  <!-- Serif terminals at top of each bar -->
  <rect x="56" y="47" width="22" height="4.5" rx="1.5" fill="url(#goldGrad)"/>
  <rect x="122" y="47" width="22" height="4.5" rx="1.5" fill="url(#goldGrad)"/>

  <!-- Stem -->
  <line x1="100" y1="140" x2="100" y2="159" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Foot -->
  <line x1="86" y1="161" x2="114" y2="161" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round"/>
</svg>
